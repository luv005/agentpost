<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 400" width="800" height="400">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0f0f14"/>
      <stop offset="100%" stop-color="#13111a"/>
    </linearGradient>
    <linearGradient id="purple" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#818cf8"/>
      <stop offset="100%" stop-color="#c084fc"/>
    </linearGradient>
    <linearGradient id="glow" x1="0.5" y1="0" x2="0.5" y2="1">
      <stop offset="0%" stop-color="#818cf8" stop-opacity="0.15"/>
      <stop offset="100%" stop-color="#818cf8" stop-opacity="0"/>
    </linearGradient>
    <filter id="blur">
      <feGaussianBlur stdDeviation="40"/>
    </filter>
    <clipPath id="card-clip">
      <rect x="0" y="0" width="800" height="400" rx="0"/>
    </clipPath>
  </defs>

  <!-- Background -->
  <rect width="800" height="400" fill="url(#bg)"/>

  <!-- Grid lines -->
  <g stroke="#818cf8" stroke-opacity="0.04" stroke-width="1">
    <line x1="0" y1="64" x2="800" y2="64"/>
    <line x1="0" y1="128" x2="800" y2="128"/>
    <line x1="0" y1="192" x2="800" y2="192"/>
    <line x1="0" y1="256" x2="800" y2="256"/>
    <line x1="0" y1="320" x2="800" y2="320"/>
    <line x1="64" y1="0" x2="64" y2="400"/>
    <line x1="128" y1="0" x2="128" y2="400"/>
    <line x1="192" y1="0" x2="192" y2="400"/>
    <line x1="256" y1="0" x2="256" y2="400"/>
    <line x1="320" y1="0" x2="320" y2="400"/>
    <line x1="384" y1="0" x2="384" y2="400"/>
    <line x1="448" y1="0" x2="448" y2="400"/>
    <line x1="512" y1="0" x2="512" y2="400"/>
    <line x1="576" y1="0" x2="576" y2="400"/>
    <line x1="640" y1="0" x2="640" y2="400"/>
    <line x1="704" y1="0" x2="704" y2="400"/>
  </g>

  <!-- Glow blob center -->
  <ellipse cx="400" cy="200" rx="300" ry="180" fill="#818cf8" fill-opacity="0.06" filter="url(#blur)"/>

  <!-- Left: Agent icon -->
  <g transform="translate(160, 200)">
    <!-- Agent box -->
    <rect x="-60" y="-70" width="120" height="140" rx="16" fill="#1a1a2e" stroke="#818cf8" stroke-opacity="0.3" stroke-width="1.5"/>
    <!-- Agent face -->
    <circle cx="0" cy="-10" r="28" fill="#818cf8" fill-opacity="0.12" stroke="#818cf8" stroke-opacity="0.4" stroke-width="1.5"/>
    <!-- Eyes -->
    <circle cx="-10" cy="-12" r="4" fill="#818cf8"/>
    <circle cx="10" cy="-12" r="4" fill="#818cf8"/>
    <!-- Smile -->
    <path d="M -12 0 Q 0 12 12 0" stroke="#818cf8" stroke-width="2" fill="none" stroke-linecap="round"/>
    <!-- Label -->
    <rect x="-36" y="26" width="72" height="22" rx="6" fill="#818cf8" fill-opacity="0.1" stroke="#818cf8" stroke-opacity="0.2" stroke-width="1"/>
    <text x="0" y="41" text-anchor="middle" font-family="monospace" font-size="10" fill="#818cf8" font-weight="600">AI AGENT</text>
    <!-- Status dot -->
    <circle cx="42" cy="-58" r="6" fill="#34d399"/>
  </g>

  <!-- Center: Email envelope with @ -->
  <g transform="translate(400, 200)">
    <!-- Envelope shadow -->
    <rect x="-52" y="-42" width="108" height="88" rx="10" fill="#818cf8" fill-opacity="0.06" filter="url(#blur)"/>
    <!-- Envelope body -->
    <rect x="-50" y="-40" width="100" height="80" rx="10" fill="#1e1e2e" stroke="url(#purple)" stroke-width="2"/>
    <!-- Envelope flap -->
    <path d="M -50 -40 L 0 10 L 50 -40" stroke="url(#purple)" stroke-width="1.5" fill="none"/>
    <!-- @ symbol -->
    <text x="0" y="28" text-anchor="middle" font-family="monospace" font-size="28" fill="url(#purple)" font-weight="700">@</text>
  </g>

  <!-- Right: Inbox/success -->
  <g transform="translate(640, 200)">
    <rect x="-60" y="-70" width="120" height="140" rx="16" fill="#0d1f1a" stroke="#34d399" stroke-opacity="0.3" stroke-width="1.5"/>
    <!-- Inbox lines -->
    <rect x="-40" y="-45" width="80" height="10" rx="4" fill="#34d399" fill-opacity="0.2"/>
    <rect x="-40" y="-28" width="60" height="8" rx="4" fill="#34d399" fill-opacity="0.12"/>
    <rect x="-40" y="-12" width="70" height="8" rx="4" fill="#34d399" fill-opacity="0.12"/>
    <rect x="-40" y="4" width="50" height="8" rx="4" fill="#34d399" fill-opacity="0.12"/>
    <!-- Check -->
    <circle cx="0" cy="38" r="20" fill="#34d399" fill-opacity="0.12" stroke="#34d399" stroke-opacity="0.4" stroke-width="1.5"/>
    <path d="M -8 38 L -2 44 L 10 30" stroke="#34d399" stroke-width="2.5" fill="none" stroke-linecap="round" stroke-linejoin="round"/>
    <!-- Label -->
    <text x="0" y="-52" text-anchor="middle" font-family="monospace" font-size="9" fill="#34d399" font-weight="600">INBOX READY</text>
  </g>

  <!-- Arrows between elements -->
  <!-- Left to center arrow -->
  <g>
    <line x1="225" y1="200" x2="340" y2="200" stroke="url(#purple)" stroke-width="1.5" stroke-dasharray="6,4"/>
    <polygon points="340,195 350,200 340,205" fill="#818cf8"/>
  </g>
  <!-- Center to right arrow -->
  <g>
    <line x1="455" y1="200" x2="572" y2="200" stroke="#34d399" stroke-width="1.5" stroke-dasharray="6,4"/>
    <polygon points="572,195 582,200 572,205" fill="#34d399"/>
  </g>

  <!-- Title text -->
  <text x="400" y="344" text-anchor="middle" font-family="Inter, -apple-system, sans-serif" font-size="20" fill="#fafafa" font-weight="700">Give Your AI Agent Its Own Email Inbox</text>
  <text x="400" y="368" text-anchor="middle" font-family="Inter, -apple-system, sans-serif" font-size="13" fill="#52525b">agentsend.io — Email Infrastructure for AI Agents</text>
</svg>
